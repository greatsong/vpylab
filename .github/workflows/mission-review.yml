name: Mission Review Helper

on:
  pull_request:
    paths:
      - 'client/src/data/missions.js'

jobs:
  mission-diff-summary:
    name: "미션 변경 요약"
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Run mission tests
        working-directory: client
        run: npx vitest run src/data/missions.test.js

      - name: Generate mission summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');

            // missions.js 변경 라인 수
            const diffStat = execSync(
              `git diff origin/main -- client/src/data/missions.js | wc -l`
            ).toString().trim();

            const body = [
              '## 미션 데이터 변경 감지',
              '',
              `변경 라인 수: **${diffStat}**`,
              '',
              '### 자동 검사 결과',
              '- [x] 미션 데이터 무결성 테스트 통과',
              '- [x] 필수 필드 (id, category, level, title, description, gradeType, starterCode, solutionCode, assertions, hints) 확인',
              '- [x] ko/en 다국어 텍스트 존재 확인',
              '- [x] ID 고유성 확인',
              '',
              '### 리뷰어 체크리스트',
              '- [ ] `starterCode`가 학생 수준에 적합한가?',
              '- [ ] `solutionCode`를 실제로 실행해 보았는가?',
              '- [ ] `assertions`가 다양한 정답을 허용하는가?',
              '- [ ] 힌트가 점진적으로 도움이 되는가?',
              '- [ ] 교육과정 연계가 적절한가?',
              '- [ ] 콘텐츠가 교육적으로 적절한가?',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
