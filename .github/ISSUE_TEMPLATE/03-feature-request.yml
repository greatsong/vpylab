name: "기능 요청 (Feature Request)"
description: "새 기능을 제안합니다. Suggest a new feature."
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        기능을 제안해 주셔서 감사합니다!

  - type: textarea
    id: problem
    attributes:
      label: "해결하려는 문제 (Problem)"
      description: "어떤 불편함이나 필요성이 있나요?"
      placeholder: "학생들이 작품을 친구에게 공유하기 어렵습니다..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "제안 해결책 (Proposed Solution)"
      description: "어떤 기능이 있으면 좋겠나요?"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "대안 (Alternatives Considered)"
      description: "다른 방법을 시도해 보셨나요?"

  - type: dropdown
    id: area
    attributes:
      label: "관련 영역 (Area)"
      options:
        - "3D 엔진 (3D Engine)"
        - "코드 에디터 (Code Editor)"
        - "미션 시스템 (Mission System)"
        - "사운드 (Sound)"
        - "UI/UX"
        - "갤러리/공유 (Gallery/Sharing)"
        - "AI 도우미 (AI Assistant)"
        - "기타 (Other)"
    validations:
      required: true

  - type: dropdown
    id: user_type
    attributes:
      label: "사용자 유형 (User Type)"
      description: "어떤 입장에서 이 기능이 필요한가요?"
      options:
        - "학생 (Student)"
        - "교사 (Teacher)"
        - "개발자 (Developer)"
        - "기타 (Other)"

  - type: checkboxes
    id: terms
    attributes:
      label: "확인사항"
      options:
        - label: "기존 Issue에 같은 제안이 없는지 확인했습니다."
          required: true
