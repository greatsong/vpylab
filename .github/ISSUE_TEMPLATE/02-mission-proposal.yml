name: "미션 제안 (Mission Proposal)"
description: "새 미션을 제안합니다. Propose a new mission."
labels: ["mission", "proposal"]
body:
  - type: markdown
    attributes:
      value: |
        새 미션 아이디어를 제안해 주셔서 감사합니다!
        미션을 직접 구현하여 PR로 제출해도 됩니다. CONTRIBUTING.md의 미션 스키마를 참고하세요.

  - type: input
    id: title_ko
    attributes:
      label: "미션 제목 (한국어)"
      placeholder: "진자 운동 시뮬레이션"
    validations:
      required: true

  - type: input
    id: title_en
    attributes:
      label: "Mission Title (English)"
      placeholder: "Pendulum Simulation"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: "카테고리 (Category)"
      options:
        - "CT — 컴퓨팅 사고 (Computational Thinking)"
        - "CR — 3D 창작 (Creative)"
        - "MA — 수학 시각화 (Math)"
        - "SC — 과학 시뮬레이션 (Science)"
        - "AR — 코드 아트 (Art)"
        - "SN — 사운드 코딩 (Sound)"
        - "AI — 인공지능 원리 (AI Principles)"
    validations:
      required: true

  - type: dropdown
    id: level
    attributes:
      label: "난이도 (Difficulty Level)"
      options:
        - "Lv.1 — 따라하기 (Follow Along)"
        - "Lv.2 — 변형하기 (Modify)"
        - "Lv.3 — 설계하기 (Design)"
        - "Lv.4 — 창작하기 (Create)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "미션 설명 (Description)"
      description: "학생이 무엇을 배우고 만들게 되나요?"
      placeholder: |
        이 미션에서 학생은:
        - 진자 운동의 물리를 이해합니다
        - sin/cos 함수를 사용하여 진동을 구현합니다
        - 에너지 보존 법칙을 시각적으로 확인합니다
    validations:
      required: true

  - type: textarea
    id: starter_code
    attributes:
      label: "시작 코드 (Starter Code, 선택)"
      description: "학생에게 제공할 시작 코드 초안이 있다면 작성해 주세요."
      render: python

  - type: textarea
    id: solution_code
    attributes:
      label: "모범 답안 (Solution Code, 선택)"
      description: "모범 답안 코드 초안이 있다면 작성해 주세요."
      render: python

  - type: dropdown
    id: grade_type
    attributes:
      label: "채점 방식 (Grading Type)"
      options:
        - "A — 정적 검사 (Object property check)"
        - "B — 궤적 비교 (Trajectory comparison)"
        - "A+B — 복합 (Both)"
    validations:
      required: true

  - type: textarea
    id: learning_goals
    attributes:
      label: "학습 목표 (Learning Goals)"
      description: "이 미션의 교육적 목표를 적어주세요."
      placeholder: |
        - 3D 좌표계 이해
        - 반복문(for loop) 사용법
        - 삼각함수의 실제 응용

  - type: textarea
    id: related
    attributes:
      label: "관련 교육과정 (Curriculum Connection, 선택)"
      description: "관련 교과, 단원, 학년 등이 있다면 적어주세요."
      placeholder: "물리 I — 역학적 에너지 보존 (고1)"

  - type: checkboxes
    id: terms
    attributes:
      label: "확인사항"
      options:
        - label: "이 미션 콘텐츠가 CC BY-NC-SA 4.0으로 공유되는 것에 동의합니다."
          required: true
        - label: "콘텐츠에 폭력적/차별적/부적절한 내용이 없습니다."
          required: true
        - label: "[행동 강령](CODE_OF_CONDUCT.md)을 읽고 동의합니다."
          required: true
